name: Firebase CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  ci:
    name: CI Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-app
    env:
      # Use deterministic placeholders so PR checks do not depend on production secrets.
      REACT_APP_FIREBASE_API_KEY: ci-placeholder
      REACT_APP_FIREBASE_AUTH_DOMAIN: ci-placeholder.firebaseapp.com
      REACT_APP_FIREBASE_PROJECT_ID: ci-placeholder
      REACT_APP_FIREBASE_STORAGE_BUCKET: ci-placeholder.appspot.com
      REACT_APP_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      REACT_APP_FIREBASE_APP_ID: "1:000000000000:web:ci"
      REACT_APP_FIREBASE_MEASUREMENT_ID: G-CI00000000
      REACT_APP_GOOGLE_MAPS_API_KEY: ci-placeholder
      REACT_APP_DC_WARD_API_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: my-app/functions-python/requirements.txt

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r functions-python/requirements.txt

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run unit tests
        run: CI=true npm run test:ci

      - name: Compile Python functions
        run: python -m py_compile functions-python/main.py functions-python/clustering.py

      - name: Build frontend
        run: npm run build

  deploy:
    name: Deploy to Firebase Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      contents: read
      id-token: write
    concurrency:
      group: firebase-prod
      cancel-in-progress: true
    defaults:
      run:
        working-directory: my-app
    env:
      FIREBASE_PROJECT_ID: food-for-all-dc-caf23
      REACT_APP_FIREBASE_API_KEY: ${{ secrets.REACT_APP_FIREBASE_API_KEY }}
      REACT_APP_FIREBASE_AUTH_DOMAIN: ${{ secrets.REACT_APP_FIREBASE_AUTH_DOMAIN }}
      REACT_APP_FIREBASE_PROJECT_ID: ${{ secrets.REACT_APP_FIREBASE_PROJECT_ID }}
      REACT_APP_FIREBASE_STORAGE_BUCKET: ${{ secrets.REACT_APP_FIREBASE_STORAGE_BUCKET }}
      REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.REACT_APP_FIREBASE_MESSAGING_SENDER_ID }}
      REACT_APP_FIREBASE_APP_ID: ${{ secrets.REACT_APP_FIREBASE_APP_ID }}
      REACT_APP_FIREBASE_MEASUREMENT_ID: ${{ secrets.REACT_APP_FIREBASE_MEASUREMENT_ID }}
      REACT_APP_GOOGLE_MAPS_API_KEY: ${{ secrets.REACT_APP_GOOGLE_MAPS_API_KEY }}
      REACT_APP_DC_WARD_API_KEY: ${{ secrets.REACT_APP_DC_WARD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: my-app/functions-python/requirements.txt

      - name: Authenticate to Google Cloud via OIDC
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Prepare Python virtualenv for Firebase deploy
        run: |
          python -m venv functions-python/venv
          source functions-python/venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r functions-python/requirements.txt

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Hosting and Functions
        run: firebase deploy --project "$FIREBASE_PROJECT_ID" --only hosting,functions --non-interactive
